<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOCC — Activation Org Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/orgchart/5.0.0/css/jquery.orgchart.min.css">
  <style>
    :root {
      --c0:#6B1111;--c1:#992222;--c2:#0F3460;--c3:#16497A;
      --c4:#0B5345;--c5:#0E6655;--c6:#2C3E50;--c7:#4A235A;--c8:#784212;
      --bg:#0D1117;--surface:#161B22;--surface2:#21262D;
      --border:#30363D;--text:#E6EDF3;--dim:#8B949E;--accent:#C0392B;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text)}
    #app{display:flex;flex-direction:column;height:100vh}

    /* Header */
    #hdr{background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 20px;height:52px;display:flex;align-items:center;
      justify-content:space-between;flex-shrink:0;position:relative}
    #hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      background:linear-gradient(180deg,var(--accent),transparent)}
    .hl{display:flex;align-items:center;gap:12px}
    .logo{width:32px;height:32px;background:var(--accent);border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#fff}
    .hdiv{width:1px;height:28px;background:var(--border)}
    .hsub{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase}
    #badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;background:rgba(192,57,43,.2);
      border:1px solid rgba(192,57,43,.4);color:#E74C3C;padding:3px 10px;border-radius:3px}
    .dot{width:6px;height:6px;border-radius:50%;background:#2ECC71;display:inline-block;
      margin-right:5px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hr{display:flex;align-items:center;gap:6px}
    .chip{font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);
      padding:3px 9px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
    .chip strong{color:var(--text)}
    .btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;background:var(--surface2);
      border:1px solid var(--border);color:var(--dim);padding:5px 12px;
      border-radius:4px;cursor:pointer;transition:all .15s}
    .btn:hover{background:var(--surface);color:var(--text);border-color:#555}
    .btn-r{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:#E74C3C}
    .btn-r:hover{background:rgba(192,57,43,.25);color:#FF6B6B}

    /* Legend */
    #leg{background:var(--surface);border-bottom:1px solid var(--border);
      padding:5px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
    .ll{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
    .li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
    .ls{width:10px;height:10px;border-radius:2px}

    /* Chart wrapper — this is the scrollable area */
    #wrap{flex:1;overflow:auto;background:var(--bg);position:relative}
    #wrap::before{content:'';position:absolute;inset:0;pointer-events:none;
      background-image:linear-gradient(var(--surface2) 1px,transparent 1px),
        linear-gradient(90deg,var(--surface2) 1px,transparent 1px);
      background-size:40px 40px;opacity:.2}

    /* Chart inner — centers the orgchart horizontally */
    #inner{
      padding:40px 80px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-width:max-content;
      min-height:100%;
      animation:fi .4s ease-out;
    }
    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* OrgChart overrides */
    .orgchart{background:transparent!important}
    .orgchart table{border-spacing:14px!important}
    .orgchart .node{width:170px!important;transition:transform .15s;cursor:default}
    .orgchart .node:hover{transform:translateY(-2px)}
    .orgchart .node .title{
      font-family:'Barlow Condensed',sans-serif!important;
      font-size:12px!important;font-weight:700!important;
      letter-spacing:.03em!important;padding:7px 10px!important;
      border-radius:6px 6px 0 0!important;line-height:1.3!important;
      color:rgba(255,255,255,.95)!important;border:none!important;
      text-shadow:0 1px 2px rgba(0,0,0,.3)}
    .orgchart .node .content{
      font-family:'Barlow',sans-serif!important;font-size:10px!important;
      padding:5px 10px!important;border-radius:0 0 6px 6px!important;
      color:var(--dim)!important;background:var(--surface2)!important;
      border:1px solid var(--border)!important;border-top:none!important;
      min-height:24px!important;line-height:1.3!important}
    .d0 .title{background:linear-gradient(135deg,#6B1111,#8B1A1A)!important;box-shadow:0 2px 8px rgba(107,17,17,.5)}
    .d1 .title{background:linear-gradient(135deg,#992222,#B03030)!important;box-shadow:0 2px 8px rgba(153,34,34,.4)}
    .d2 .title{background:linear-gradient(135deg,#0F3460,#1A4A7A)!important;box-shadow:0 2px 8px rgba(15,52,96,.5)}
    .d3 .title{background:linear-gradient(135deg,#16497A,#1E5C96)!important;box-shadow:0 2px 8px rgba(22,73,122,.4)}
    .d4 .title{background:linear-gradient(135deg,#0B5345,#0E6B58)!important;box-shadow:0 2px 8px rgba(11,83,69,.5)}
    .d5 .title{background:linear-gradient(135deg,#0E6655,#138A72)!important;box-shadow:0 2px 8px rgba(14,102,85,.4)}
    .d6 .title{background:linear-gradient(135deg,#2C3E50,#374151)!important;box-shadow:0 2px 8px rgba(44,62,80,.5)}
    .d7 .title{background:linear-gradient(135deg,#4A235A,#5C2D6E)!important;box-shadow:0 2px 8px rgba(74,35,90,.5)}
    .d8 .title{background:linear-gradient(135deg,#784212,#8E5318)!important;box-shadow:0 2px 8px rgba(120,66,18,.5)}
    .orgchart .lines .downLine{background-color:#30363D!important;width:1px!important}
    .orgchart .lines .topLine{border-top:1px solid #30363D!important}
    .orgchart .lines .rightLine{border-right:1px solid #30363D!important}
    .orgchart .lines .leftLine{border-left:1px solid #30363D!important}
    .orgchart .node .edge{display:none!important}

    /* Loading */
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;
      flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px}
    .slogo{width:52px;height:52px;background:rgba(192,57,43,.15);
      border:1px solid rgba(192,57,43,.3);border-radius:10px;display:flex;
      align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;
      font-weight:800;font-size:20px;color:var(--accent)}
    .sbar{width:180px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .sfill{height:100%;background:linear-gradient(90deg,var(--accent),#E74C3C);
      animation:lb 1.5s ease-in-out infinite}
    @keyframes lb{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
    .stxt{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--dim)}

    /* Message */
    #msgbox{display:none;position:fixed;inset:0;background:var(--bg);
      align-items:center;justify-content:center;z-index:100}
    #msgbox.vis{display:flex}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:30px 38px;max-width:500px;text-align:center}
    .micon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;
      justify-content:center;font-size:20px;margin:0 auto 14px}
    .mcard h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;
      letter-spacing:.04em;color:var(--text);margin-bottom:8px}
    .mcard p{font-size:12px;color:var(--dim);line-height:1.7}
    .mcard code{display:block;background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;padding:10px 14px;font-size:10px;color:#79C0FF;text-align:left;
      margin-top:10px;line-height:1.6;word-break:break-all}

    /* Zoom */
    #zc{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;
      gap:4px;z-index:50}
    .zb{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);
      color:var(--dim);border-radius:4px;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;transition:all .15s}
    .zb:hover{background:var(--surface2);color:var(--text);border-color:#555}
  </style>
</head>
<body>

<div id="loading">
  <div class="slogo">ARC</div>
  <div class="sbar"><div class="sfill"></div></div>
  <div class="stxt">Loading Activation Roster</div>
</div>

<div id="msgbox">
  <div class="mcard">
    <div class="micon" id="micon"></div>
    <h3 id="mtitle"></h3>
    <p id="mbody"></p>
    <code id="mcode" style="display:none"></code>
  </div>
</div>

<div id="app" style="display:none">
  <div id="hdr">
    <div class="hl">
      <div class="logo">ARC</div>
      <div class="hdiv"></div>
      <div>
        <div class="hsub">Disaster Operations Coordination Center</div>
        <div class="htitle">Activation Org Chart</div>
      </div>
      <div id="badge"><span class="dot"></span>ACTIVATED</div>
    </div>
    <div class="hr">
      <div class="chip"><strong id="st">—</strong> positions</div>
      <div class="chip"><strong id="sf">—</strong> filled</div>
      <div class="chip"><strong id="sv">—</strong> vacant</div>
      <div class="hdiv"></div>
      <button class="btn btn-r" onclick="resetView()">⊕ Center</button>
      <button class="btn" onclick="window.print()">Print</button>
    </div>
  </div>

  <div id="leg">
    <span class="ll">Levels:</span>
    <div class="li"><div class="ls" style="background:#6B1111"></div>Director</div>
    <div class="li"><div class="ls" style="background:#992222"></div>Deputy</div>
    <div class="li"><div class="ls" style="background:#0F3460"></div>NAD</div>
    <div class="li"><div class="ls" style="background:#16497A"></div>Branch</div>
    <div class="li"><div class="ls" style="background:#0B5345"></div>Section</div>
    <div class="li"><div class="ls" style="background:#0E6655"></div>Unit</div>
    <div class="li"><div class="ls" style="background:#2C3E50"></div>L6</div>
    <div class="li"><div class="ls" style="background:#4A235A"></div>L7</div>
    <div class="li"><div class="ls" style="background:#784212"></div>L8</div>
    <div style="margin-left:auto;font-size:10px;color:var(--dim)">Drag to pan &nbsp;·&nbsp; Scroll to zoom</div>
  </div>

  <div id="wrap">
    <div id="inner">
      <div id="chart"></div>
    </div>
  </div>
</div>

<div id="zc" style="display:none">
  <button class="zb" onclick="zoomIn()">+</button>
  <button class="zb" onclick="zoomOut()">−</button>
  <button class="zb" onclick="resetView()" style="font-size:11px">⊕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/orgchart/5.0.0/js/jquery.orgchart.min.js"></script>
<script>
var zoom = 1.0;

function param(n) {
  var r = new RegExp('[?&]' + n + '=([^&#]*)').exec(location.href);
  return r ? decodeURIComponent(r[1].replace(/\+/g,' ')) : null;
}

function msg(icon, title, body, code, err) {
  $('#loading').hide();
  $('#micon').html(icon).css({
    background: err ? 'rgba(192,57,43,.15)' : 'rgba(22,73,122,.15)',
    border: err ? '1px solid rgba(192,57,43,.3)' : '1px solid rgba(22,73,122,.3)'
  });
  $('#mtitle').text(title);
  $('#mbody').html(body);
  if (code) $('#mcode').text(code).show();
  $('#msgbox').addClass('vis');
}

function buildTree(items) {
  var map = {}, roots = [];
  items.forEach(function(x) {
    map[x.i] = {
      id: String(x.i),
      name: (x.t||'(Untitled)').trim(),
      title: (x.p||'(Vacant)').trim(),
      pid: x.r||0,
      children: []
    };
  });
  Object.values(map).forEach(function(n) {
    if (n.pid && map[n.pid]) map[n.pid].children.push(n);
    else roots.push(n);
  });
  if (!roots.length) throw new Error('No root nodes found.');
  return roots.length === 1 ? roots[0] : {id:'r',name:'DOCC',title:'',pid:0,children:roots};
}

function depth(n, d) {
  n.depth = d;
  (n.children||[]).forEach(function(c){ depth(c, d+1); });
}

function render(tree) {
  $('#chart').empty();
  $('#chart').orgchart({
    data: tree,
    nodeTitle: 'name',
    nodeContent: 'title',
    pan: true,
    zoom: true,
    zoomInLimit: 2.5,
    zoomOutLimit: 0.15,
    collapsible: false,
    createNode: function($n, d) {
      $n.addClass('d' + Math.min(d.depth||0, 8));
      var nm = d.name||'', p = d.title||'';
      $n.find('.title').attr('title',nm).text(nm.length>28?nm.slice(0,26)+'…':nm);
      $n.find('.content').attr('title',p).text(p.length>28?p.slice(0,26)+'…':p);
    }
  });
}

function stats(items) {
  var v = items.filter(function(i){ return !i.p||i.p==='(Vacant)'; }).length;
  $('#st').text(items.length);
  $('#sf').text(items.length-v);
  $('#sv').text(v);
}

// Center by scrolling the wrapper so the chart table is horizontally centered
function centerView() {
  setTimeout(function() {
    var wrap = document.getElementById('wrap');
    var inner = document.getElementById('inner');
    if (!wrap || !inner) return;
    // inner uses min-width:max-content so its scrollWidth = actual chart width + padding
    var scrollW = inner.scrollWidth;
    var clientW = wrap.clientWidth;
    // If chart is wider than viewport, scroll to horizontal center
    // If chart is narrower, scrollLeft = 0 and flexbox centers it
    wrap.scrollLeft = scrollW > clientW ? Math.floor((scrollW - clientW) / 2) : 0;
    wrap.scrollTop = 0;
  }, 800);
}

function resetView() {
  zoom = 1.0;
  $('#chart').css({transform:'', 'transform-origin':''});
  centerView();
}

function zoomIn()  { zoom = Math.min(zoom+0.15,2.5); $('#chart').css({transform:'scale('+zoom+')', 'transform-origin':'top center'}); }
function zoomOut() { zoom = Math.max(zoom-0.15,0.15); $('#chart').css({transform:'scale('+zoom+')', 'transform-origin':'top center'}); }

$(function() {
  var raw = param('data');
  if (!raw) {
    msg('📋','No Roster Data',
      'Open this page using the <strong>View Org Chart</strong> button in PowerApps.',
      'https://cyoungarc.github.io/docc-orgchart/?data=[encoded JSON]', false);
    return;
  }
  var items;
  try {
    items = JSON.parse(raw);
    if (!Array.isArray(items)||!items.length) throw new Error('Empty array.');
  } catch(e) {
    msg('⚠️','Data Error','Could not parse roster: <strong>'+e.message+'</strong>',null,true);
    return;
  }
  try {
    var tree = buildTree(items);
    depth(tree, 0);
    stats(items);
    $('#loading').fadeOut(200, function(){
      $('#app').show();
      $('#zc').show();
      render(tree);
      centerView();
    });
  } catch(e) {
    msg('⚠️','Error', e.message, null, true);
  }
});
</script>
</body>
</html>
