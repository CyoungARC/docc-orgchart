<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOCC — Activation Org Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/orgchart/5.0.0/css/jquery.orgchart.min.css">
  <style>
    :root {
      --c0:#6B1111;--c1:#992222;--c2:#0F3460;--c3:#16497A;
      --c4:#0B5345;--c5:#0E6655;--c6:#2C3E50;--c7:#4A235A;--c8:#784212;
      --bg:#0D1117;--surface:#161B22;--surface2:#21262D;
      --border:#30363D;--text:#E6EDF3;--dim:#8B949E;--accent:#C0392B;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text)}
    #app{display:flex;flex-direction:column;height:100vh}

    /* Header */
    #hdr{background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 20px;height:52px;display:flex;align-items:center;
      justify-content:space-between;flex-shrink:0;position:relative}
    #hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      background:linear-gradient(180deg,var(--accent),transparent)}
    .hl{display:flex;align-items:center;gap:12px}
    .logo{width:32px;height:32px;background:var(--accent);border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#fff}
    .hdiv{width:1px;height:28px;background:var(--border)}
    .hsub{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase}
    #badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;background:rgba(192,57,43,.2);
      border:1px solid rgba(192,57,43,.4);color:#E74C3C;padding:3px 10px;border-radius:3px}
    .dot{width:6px;height:6px;border-radius:50%;background:#2ECC71;display:inline-block;
      margin-right:5px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hr{display:flex;align-items:center;gap:6px}
    .btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;background:var(--surface2);
      border:1px solid var(--border);color:var(--dim);padding:5px 12px;
      border-radius:4px;cursor:pointer;transition:all .15s}
    .btn:hover{background:var(--surface);color:var(--text);border-color:#555}

    /* Legend */
    #leg{background:var(--surface);border-bottom:1px solid var(--border);
      padding:5px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
    .ll{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
    .li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
    .ls{width:10px;height:10px;border-radius:2px}

    /* Tab bar */
    #tabs{background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 20px;display:flex;align-items:center;gap:2px;flex-shrink:0}
    .tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;cursor:pointer;
      color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;
      background:none;border-top:none;border-left:none;border-right:none}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--text);border-bottom-color:var(--accent)}

    /* Chart panel */
    #panel-chart{flex:1;overflow:auto;background:var(--bg);position:relative;display:block}
    #panel-chart::before{content:'';position:absolute;inset:0;pointer-events:none;
      background-image:linear-gradient(var(--surface2) 1px,transparent 1px),
        linear-gradient(90deg,var(--surface2) 1px,transparent 1px);
      background-size:40px 40px;opacity:.2}

    /* This is the key — flex centering of the orgchart */
    #inner{
  padding:40px;
  text-align:center;
  position:relative;
  animation:fi .4s ease-out;
}
    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* Table panel */
    #panel-table{flex:1;overflow:auto;background:var(--bg);display:none;padding:20px}

    /* OrgChart overrides */
    .orgchart{background:transparent!important;display:inline-block!important}
    .orgchart table{border-spacing:14px!important}
    .orgchart .node{width:170px!important;transition:transform .15s;cursor:default}
    .orgchart .node:hover{transform:translateY(-2px)}
    .orgchart .node .title{
      font-family:'Barlow Condensed',sans-serif!important;font-size:12px!important;
      font-weight:700!important;letter-spacing:.03em!important;padding:7px 10px!important;
      border-radius:6px 6px 0 0!important;line-height:1.3!important;
      color:rgba(255,255,255,.95)!important;border:none!important;
      text-shadow:0 1px 2px rgba(0,0,0,.3)}
    .orgchart .node .content{
      font-family:'Barlow',sans-serif!important;font-size:10px!important;
      padding:5px 10px!important;border-radius:0 0 6px 6px!important;
      color:var(--dim)!important;background:var(--surface2)!important;
      border:1px solid var(--border)!important;border-top:none!important;
      min-height:24px!important;line-height:1.3!important}
    .d0 .title{background:linear-gradient(135deg,#6B1111,#8B1A1A)!important;box-shadow:0 2px 8px rgba(107,17,17,.5)}
    .d1 .title{background:linear-gradient(135deg,#992222,#B03030)!important;box-shadow:0 2px 8px rgba(153,34,34,.4)}
    .d2 .title{background:linear-gradient(135deg,#0F3460,#1A4A7A)!important;box-shadow:0 2px 8px rgba(15,52,96,.5)}
    .d3 .title{background:linear-gradient(135deg,#16497A,#1E5C96)!important;box-shadow:0 2px 8px rgba(22,73,122,.4)}
    .d4 .title{background:linear-gradient(135deg,#0B5345,#0E6B58)!important;box-shadow:0 2px 8px rgba(11,83,69,.5)}
    .d5 .title{background:linear-gradient(135deg,#0E6655,#138A72)!important;box-shadow:0 2px 8px rgba(14,102,85,.4)}
    .d6 .title{background:linear-gradient(135deg,#2C3E50,#374151)!important;box-shadow:0 2px 8px rgba(44,62,80,.5)}
    .d7 .title{background:linear-gradient(135deg,#4A235A,#5C2D6E)!important;box-shadow:0 2px 8px rgba(74,35,90,.5)}
    .d8 .title{background:linear-gradient(135deg,#784212,#8E5318)!important;box-shadow:0 2px 8px rgba(120,66,18,.5)}
    .orgchart .lines .downLine{background-color:#30363D!important;width:1px!important}
    .orgchart .lines .topLine{border-top:1px solid #30363D!important}
    .orgchart .lines .rightLine{border-right:1px solid #30363D!important}
    .orgchart .lines .leftLine{border-left:1px solid #30363D!important}
    .orgchart .node .edge{display:none!important}

    /* Roster table */
    #roster-search{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    #search-input{font-family:'Barlow',sans-serif;font-size:12px;background:var(--surface);
      border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:4px;
      width:280px;outline:none;transition:border-color .15s}
    #search-input:focus{border-color:#4A5568}
    #search-input::placeholder{color:var(--dim)}
    #row-count{font-size:11px;color:var(--dim);margin-left:auto;
      font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
    #roster-table{width:100%;border-collapse:collapse;font-size:12px}
    #roster-table thead tr{background:var(--surface);position:sticky;top:0;z-index:5}
    #roster-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:10px 14px;
      text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;
      cursor:pointer;user-select:none}
    #roster-table th:hover{color:var(--text)}
    #roster-table th.sorted{color:var(--text)}
    #roster-table th .sort-arrow{margin-left:4px;opacity:.5}
    #roster-table th.sorted .sort-arrow{opacity:1;color:var(--accent)}
    #roster-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    #roster-table tbody tr:hover{background:var(--surface)}
    #roster-table td{padding:9px 14px;color:var(--text);vertical-align:middle}
    #roster-table td.vacant{color:var(--dim);font-style:italic}
    #roster-table td.pos{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.02em}
    #roster-table td.sec{color:var(--dim);font-size:11px}
    #roster-table td.email a{color:#79C0FF;text-decoration:none;font-size:11px}
    #roster-table td.email a:hover{text-decoration:underline}
    #roster-table td.phone{font-size:11px;color:var(--dim)}
    .dbadge{display:inline-block;width:8px;height:8px;border-radius:2px;
      margin-right:6px;vertical-align:middle;flex-shrink:0}

    /* Loading */
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;
      flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px}
    .slogo{width:52px;height:52px;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--accent)}
    .sbar{width:180px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .sfill{height:100%;background:linear-gradient(90deg,var(--accent),#E74C3C);animation:lb 1.5s ease-in-out infinite}
    @keyframes lb{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
    .stxt{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}

    /* Message */
    #msgbox{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;z-index:100}
    #msgbox.vis{display:flex}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:30px 38px;max-width:500px;text-align:center}
    .micon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 14px}
    .mcard h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.04em;color:var(--text);margin-bottom:8px}
    .mcard p{font-size:12px;color:var(--dim);line-height:1.7}
    .mcard code{display:block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:10px;color:#79C0FF;text-align:left;margin-top:10px;line-height:1.6;word-break:break-all}

    /* Zoom */
    #zc{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:4px;z-index:50}
    #zc.hidden{display:none}
    .zb{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);color:var(--dim);
      border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .zb:hover{background:var(--surface2);color:var(--text);border-color:#555}
  </style>
</head>
<body>

<div id="loading">
  <div class="slogo">ARC</div>
  <div class="sbar"><div class="sfill"></div></div>
  <div class="stxt">Loading Activation Roster</div>
</div>

<div id="msgbox">
  <div class="mcard">
    <div class="micon" id="micon"></div>
    <h3 id="mtitle"></h3>
    <p id="mbody"></p>
    <code id="mcode" style="display:none"></code>
  </div>
</div>

<div id="app" style="display:none">
  <div id="hdr">
    <div class="hl">
      <div class="logo">ARC</div>
      <div class="hdiv"></div>
      <div>
        <div class="hsub">Disaster Operations Coordination Center</div>
        <div class="htitle">Activation Org Chart</div>
      </div>
      <div id="badge"><span class="dot"></span>ACTIVATED</div>
    </div>
    <div class="hr">
      <button class="btn" onclick="window.print()">Print</button>
    </div>
  </div>

  <div id="leg">
    <span class="ll">Levels:</span>
    <div class="li"><div class="ls" style="background:#6B1111"></div>Director</div>
    <div class="li"><div class="ls" style="background:#992222"></div>Deputy</div>
    <div class="li"><div class="ls" style="background:#0F3460"></div>NAD</div>
    <div class="li"><div class="ls" style="background:#16497A"></div>Branch</div>
    <div class="li"><div class="ls" style="background:#0B5345"></div>Section</div>
    <div class="li"><div class="ls" style="background:#0E6655"></div>Unit</div>
    <div class="li"><div class="ls" style="background:#2C3E50"></div>L6</div>
    <div class="li"><div class="ls" style="background:#4A235A"></div>L7</div>
    <div class="li"><div class="ls" style="background:#784212"></div>L8</div>
    <div style="margin-left:auto;font-size:10px;color:var(--dim)">Drag to pan &nbsp;·&nbsp; Scroll to zoom</div>
  </div>

  <div id="tabs">
    <button class="tab active" id="tab-chart" onclick="showTab('chart')">Org Chart</button>
    <button class="tab" id="tab-table" onclick="showTab('table')">Roster</button>
  </div>

  <div id="panel-chart">
    <div id="inner">
      <div id="chart"></div>
    </div>
  </div>

  <div id="panel-table">
    <div id="roster-search">
      <input type="text" id="search-input" placeholder="Search position, name, section..." oninput="filterTable()">
      <span id="row-count"></span>
    </div>
    <table id="roster-table">
      <thead>
        <tr>
          <th onclick="sortTable('t')" id="th-t">Position <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('s')" id="th-s">Section <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('p')" id="th-p">Name <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('ph')" id="th-ph">Phone <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('e')" id="th-e">Email <span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="roster-body"></tbody>
    </table>
  </div>
</div>

<div id="zc" class="hidden">
  <button class="zb" onclick="zoomIn()">+</button>
  <button class="zb" onclick="zoomOut()">−</button>
  <button class="zb" onclick="resetView()" style="font-size:11px">⊕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/orgchart/5.0.0/js/jquery.orgchart.min.js"></script>
<script>
var zoom = 1.0;
var allItems = [];
var sortCol = 'so';
var sortAsc = true;
var depthColors = ['#6B1111','#992222','#0F3460','#16497A','#0B5345','#0E6655','#2C3E50','#4A235A','#784212'];
var depthMap = {};

function param(n) {
  var r = new RegExp('[?&]' + n + '=([^&#]*)').exec(location.href);
  return r ? decodeURIComponent(r[1].replace(/\+/g,' ')) : null;
}

function showMsg(icon, title, body, code, err) {
  $('#loading').hide();
  $('#micon').html(icon).css({
    background: err ? 'rgba(192,57,43,.15)' : 'rgba(22,73,122,.15)',
    border: err ? '1px solid rgba(192,57,43,.3)' : '1px solid rgba(22,73,122,.3)'
  });
  $('#mtitle').text(title);
  $('#mbody').html(body);
  if (code) $('#mcode').text(code).show();
  $('#msgbox').addClass('vis');
}

function buildTree(items) {
  var map = {}, roots = [];
  items.forEach(function(x) {
    map[x.i] = {id:String(x.i), name:(x.t||'(Untitled)').trim(),
      title:(x.p||'(Vacant)').trim(), pid:x.r||0, children:[]};
  });
  Object.values(map).forEach(function(n) {
    if (n.pid && map[n.pid]) map[n.pid].children.push(n);
    else roots.push(n);
  });
  if (!roots.length) throw new Error('No root nodes found.');
  return roots.length === 1 ? roots[0] : {id:'r',name:'DOCC',title:'',pid:0,children:roots};
}

function assignDepths(n, d) {
  n.depth = d;
  depthMap[n.id] = d;
  (n.children||[]).forEach(function(c){ assignDepths(c, d+1); });
}

function renderChart(tree) {
  $('#chart').empty();
  $('#chart').orgchart({
    data: tree,
    nodeTitle: 'name',
    nodeContent: 'title',
    pan: true,
    zoom: true,
    zoomInLimit: 2.5,
    zoomOutLimit: 0.15,
    collapsible: false,
    createNode: function($n, d) {
      $n.addClass('d' + Math.min(d.depth||0, 8));
      var nm = d.name||'', p = d.title||'';
      $n.find('.title').attr('title',nm).text(nm.length>28?nm.slice(0,26)+'…':nm);
      $n.find('.content').attr('title',p).text(p.length>28?p.slice(0,26)+'…':p);
    }
  });
}

function renderTable(items) {
  var search = (document.getElementById('search-input').value||'').toLowerCase();
  var filtered = items.filter(function(x) {
    if (!search) return true;
    return (x.t||'').toLowerCase().indexOf(search)>-1 ||
           (x.p||'').toLowerCase().indexOf(search)>-1 ||
           (x.s||'').toLowerCase().indexOf(search)>-1 ||
           (x.e||'').toLowerCase().indexOf(search)>-1;
  });
  filtered.sort(function(a, b) {
    var va = a[sortCol]||'', vb = b[sortCol]||'';
    if (sortCol==='so'){va=Number(va)||999;vb=Number(vb)||999;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    return sortAsc ? (va<vb?-1:va>vb?1:0) : (va<vb?1:va>vb?-1:0);
  });
  var tbody = document.getElementById('roster-body');
  tbody.innerHTML = '';
  filtered.forEach(function(x) {
    var d = depthMap[String(x.i)]||0;
    var color = depthColors[Math.min(d, depthColors.length-1)];
    var isVacant = !x.p||x.p==='(Vacant)';
    var emailHtml = x.e ? '<a href="mailto:'+x.e+'">'+escHtml(x.e)+'</a>' : '<span style="color:var(--dim)">—</span>';
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="pos"><span class="dbadge" style="background:'+color+'"></span>'+escHtml(x.t||'')+'</td>'+
      '<td class="sec">'+escHtml(x.s||'—')+'</td>'+
      '<td class="'+(isVacant?'vacant':'')+'">'+escHtml(x.p||'(Vacant)')+'</td>'+
      '<td class="phone">'+escHtml(x.ph||'—')+'</td>'+
      '<td class="email">'+emailHtml+'</td>';
    tbody.appendChild(tr);
  });
  document.getElementById('row-count').textContent = filtered.length+' of '+items.length+' positions';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filterTable(){ renderTable(allItems); }

function sortTable(col) {
  if (sortCol===col) sortAsc=!sortAsc; else{sortCol=col;sortAsc=true;}
  document.querySelectorAll('#roster-table th').forEach(function(th){
    th.classList.remove('sorted');
    var a=th.querySelector('.sort-arrow'); if(a) a.textContent='↕';
  });
  var th=document.getElementById('th-'+col);
  if(th){th.classList.add('sorted');var a=th.querySelector('.sort-arrow');if(a)a.textContent=sortAsc?'↑':'↓';}
  renderTable(allItems);
}

function showTab(name) {
  if (name==='chart') {
    document.getElementById('panel-chart').style.display='flex';
    document.getElementById('panel-table').style.display='none';
    document.getElementById('tab-chart').classList.add('active');
    document.getElementById('tab-table').classList.remove('active');
    document.getElementById('zc').classList.remove('hidden');
  } else {
    document.getElementById('panel-chart').style.display='none';
    document.getElementById('panel-table').style.display='block';
    document.getElementById('tab-chart').classList.remove('active');
    document.getElementById('tab-table').classList.add('active');
    document.getElementById('zc').classList.add('hidden');
    renderTable(allItems);
  }
}

// THE KEY CENTERING FIX — reset the library's own transform to zero
function centerView() {
  setTimeout(function() {
    var chart = document.querySelector('.orgchart');
    if (!chart) return;
    chart.style.transform = 'matrix(1, 0, 0, 1, 0, 0)';
  }, 800);
}

function resetView() {
  zoom = 1.0;
  $('#chart').css({transform:'','-webkit-transform':''});
  centerView();
}

function zoomIn()  { zoom=Math.min(zoom+0.15,2.5); $('#chart').css({transform:'scale('+zoom+')','transform-origin':'top center'}); }
function zoomOut() { zoom=Math.max(zoom-0.15,0.15); $('#chart').css({transform:'scale('+zoom+')','transform-origin':'top center'}); }

$(function() {
  var raw = param('data');
  if (!raw) {
    showMsg('📋','No Roster Data','Open this page using the <strong>View Org Chart</strong> button in PowerApps.',
      'https://cyoungarc.github.io/docc-orgchart/?data=[encoded JSON]',false);
    return;
  }
  try {
    allItems = JSON.parse(raw);
    if (!Array.isArray(allItems)||!allItems.length) throw new Error('Empty array.');
  } catch(e) {
    showMsg('⚠️','Data Error','Could not parse roster: <strong>'+e.message+'</strong>',null,true);
    return;
  }
  try {
    var tree = buildTree(allItems);
    assignDepths(tree, 0);
    $('#loading').fadeOut(200, function(){
      $('#app').show();
      $('#zc').removeClass('hidden');
      renderChart(tree);
      centerView();
    });
  } catch(e) {
    showMsg('⚠️','Error',e.message,null,true);
  }
});
</script>
